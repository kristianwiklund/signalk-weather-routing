<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Routing</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: sans-serif; font-size: 14px; }

    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #1e2230;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 14px;
    }

    #map { flex: 1; }

    h1 { font-size: 16px; color: #89b4fa; font-weight: 600; }

    .section { background: #2a2f45; border-radius: 6px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #6c7086; margin-bottom: 2px; }

    label { font-size: 12px; color: #a6adc8; }
    input[type="datetime-local"], input[type="text"] {
      width: 100%; padding: 6px 8px; border-radius: 4px;
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      font-size: 13px;
    }
    input:focus { outline: none; border-color: #89b4fa; }

    .coord-row { display: flex; gap: 6px; align-items: center; }
    .coord-row span { font-size: 12px; color: #6c7086; white-space: nowrap; }
    .coord-value { font-size: 13px; font-family: monospace; color: #cdd6f4; }
    .marker-btn {
      padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none;
      background: #313244; color: #cdd6f4; white-space: nowrap;
    }
    .marker-btn.active { background: #89b4fa; color: #1e1e2e; }

    button#calculate {
      width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; border: none;
      background: #89b4fa; color: #1e1e2e; font-size: 14px; font-weight: 600;
    }
    button#calculate:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }

    #status-box {
      background: #2a2f45; border-radius: 6px; padding: 10px;
      font-size: 12px; color: #a6adc8; line-height: 1.5; min-height: 48px;
    }
    #status-box.error { color: #f38ba8; }
    #status-box.done  { color: #a6e3a1; }

    #progress-bar-wrap { background: #313244; border-radius: 4px; height: 6px; overflow: hidden; }
    #progress-bar { height: 100%; background: #89b4fa; width: 0; transition: width 0.3s; }

    #grib-info { font-size: 11px; color: #6c7086; line-height: 1.6; }
    #grib-info span { color: #a6adc8; }

    .reload-btn {
      width: 100%; padding: 6px; border-radius: 4px; cursor: pointer; border: none;
      background: #313244; color: #a6adc8; font-size: 12px;
    }
    .reload-btn:hover { background: #45475a; }

    select {
      width: 100%; padding: 6px 8px; border-radius: 4px;
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      font-size: 13px; cursor: pointer;
    }
    select:focus { outline: none; border-color: #89b4fa; }

    .layer-toggle { display:flex; align-items:center; gap:8px; color:#cdd6f4; cursor:pointer; font-size:14px; }
    .layer-toggle input[type="checkbox"] { accent-color:#89b4fa; cursor:pointer; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>&#9973; Weather Routing</h1>

    <div class="section">
      <div class="section-title">Chart</div>
      <select id="chart-select"><option>Loading…</option></select>
    </div>

    <div class="section">
      <div class="section-title">Layers</div>
      <label class="layer-toggle">
        <input type="checkbox" id="land-toggle"> Land overlay
      </label>
    </div>

    <div class="section">
      <div class="section-title">GRIB Forecast</div>
      <div id="grib-info">Loading...</div>
      <button class="reload-btn" id="reload-grib">Reload GRIB file</button>
    </div>

    <div class="section">
      <div class="section-title">Departure</div>
      <div class="coord-row">
        <button class="marker-btn" id="btn-start">Set on map</button>
        <span class="coord-value" id="start-coords">&#8212;</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Destination</div>
      <div class="coord-row">
        <button class="marker-btn" id="btn-end">Set on map</button>
        <span class="coord-value" id="end-coords">&#8212;</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Departure Time</div>
      <input type="datetime-local" id="departure-time">
    </div>

    <button id="calculate" disabled>Calculate Route</button>
    <button id="run-test">Run test</button>

    <div id="progress-bar-wrap" style="display:none">
      <div id="progress-bar"></div>
    </div>

    <div id="status-box">Ready</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // SignalK's helmet sets Referrer-Policy: no-referrer on the page, which strips
    // the Referer header from tile requests. The referrerpolicy attribute on <img>
    // elements overrides the document-level policy for that specific request.
    const _origCreateTile = L.TileLayer.prototype.createTile;
    L.TileLayer.prototype.createTile = function(coords, done) {
      const tile = _origCreateTile.call(this, coords, done);
      tile.referrerPolicy = 'strict-origin-when-cross-origin';
      return tile;
    };
  </script>
  <script>
    const API = '/plugins/signalk-weather-routing';

    const map = L.map('map').setView([0, 0], 2);
    map.createPane('windBarbPane').style.zIndex = '350';
    map.createPane('landPane').style.zIndex = '250';

    let startLatLon = null;
    let endLatLon = null;
    let placing = null;
    let routeLayer = null;
    let windBarbLayer = null;
    const ISOCHRONE_COLOURS = ['#000000', '#4477ff', '#8833cc', '#cc3333'];
    let isochroneLayers = [];

    function sortByBearing(pts, origin) {
      return pts.slice().sort((a, b) =>
        Math.atan2(a[1] - origin.lon, a[0] - origin.lat) -
        Math.atan2(b[1] - origin.lon, b[0] - origin.lat)
      );
    }
    let legLabelLayer = null;
    let tileLayer = null;
    let gribBoundsLayer = null;
    let landLayer = null;
    let gribBounds = null;
    let calcStream = null;

    const startMarker = L.marker([0,0], { icon: greenIcon() }).addTo(map);
    const endMarker   = L.marker([0,0], { icon: redIcon() }).addTo(map);
    startMarker.remove();
    endMarker.remove();

    const btnStart     = document.getElementById('btn-start');
    const btnEnd       = document.getElementById('btn-end');
    const startCoords  = document.getElementById('start-coords');
    const endCoords    = document.getElementById('end-coords');
    const calcBtn      = document.getElementById('calculate');
    const statusBox    = document.getElementById('status-box');
    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const gribInfo     = document.getElementById('grib-info');

    btnStart.addEventListener('click', () => activatePlacing('start'));
    btnEnd.addEventListener('click',   () => activatePlacing('end'));

    document.getElementById('reload-grib').addEventListener('click', async () => {
      try {
        const r = await apiFetch(`${API}/reload-grib`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const j = await r.json();
        if (j.error) setStatus('error', j.error);
        else loadGribInfo();
      } catch(e) { setStatus('error', String(e)); }
    });

    map.on('click', (e) => {
      if (!placing) return;
      const { lat, lng } = e.latlng;
      if (placing === 'start') {
        startLatLon = { lat, lon: lng };
        startCoords.textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        startMarker.setLatLng([lat, lng]).addTo(map);
        btnStart.classList.remove('active');
      } else {
        endLatLon = { lat, lon: lng };
        endCoords.textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        endMarker.setLatLng([lat, lng]).addTo(map);
        btnEnd.classList.remove('active');
      }
      placing = null;
      map.getContainer().style.cursor = '';
      updateCalcButton();
    });

    calcBtn.addEventListener('click', startCalculation);
    document.getElementById('run-test').addEventListener('click', runTest);

    const now = new Date(Math.ceil(Date.now() / 1800000) * 1800000);
    document.getElementById('departure-time').value = toLocalDateTimeInput(now);

    loadGribInfo();
    loadCharts();

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { ...options, credentials: 'include' });
      if (res.status === 401 || res.status === 403) {
        location.href = `/admin/#/login?redirect=${encodeURIComponent(location.href)}`;
      }
      return res;
    }

    async function loadCharts() {
      const charts = [{
        name: 'OpenStreetMap',
        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }];

      try {
        const r = await apiFetch('/signalk/v2/api/resources/charts');
        if (r.ok) {
          const data = await r.json();
          for (const [id, chart] of Object.entries(data)) {
            if (chart.serverType !== 'tilelayer') continue;
            if (chart.url?.includes('.mvt')) continue;
            charts.push({
              name: chart.name || id,
              url: chart.url.replace(/\$z/g, '{z}').replace(/\$x/g, '{x}').replace(/\$y/g, '{y}'),
              attribution: chart.name || id,
            });
          }
        }
      } catch(e) { /* fall back to OSM only */ }

      const select = document.getElementById('chart-select');
      select.innerHTML = charts.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
      setChart(charts[0]);
      select.addEventListener('change', () => setChart(charts[parseInt(select.value)]));
    }

    function setChart(chart) {
      if (tileLayer) map.removeLayer(tileLayer);
      tileLayer = L.tileLayer(chart.url, { attribution: chart.attribution, maxZoom: 19 }).addTo(map);
    }

    async function loadGribInfo() {
      try {
        const r = await apiFetch(`${API}/grib-info`);
        const j = await r.json();
        if (!j.loaded) {
          gribInfo.innerHTML = '<span>No GRIB file loaded</span>';
          if (gribBoundsLayer) { map.removeLayer(gribBoundsLayer); gribBoundsLayer = null; }
          return;
        }
        gribInfo.innerHTML =
          `<span>${j.nTimes} time steps</span><br>` +
          `${j.timeStart?.slice(0,16).replace('T',' ')} &rarr; ${j.timeEnd?.slice(0,16).replace('T',' ')}<br>` +
          `Lat ${j.latMin?.toFixed(1)}&ndash;${j.latMax?.toFixed(1)} ` +
          `Lon ${j.lonMin?.toFixed(1)}&ndash;${j.lonMax?.toFixed(1)}`;
        gribBounds = { latMin: j.latMin, lonMin: j.lonMin, latMax: j.latMax, lonMax: j.lonMax };
        if (gribBoundsLayer) map.removeLayer(gribBoundsLayer);
        gribBoundsLayer = L.rectangle([[j.latMin, j.lonMin], [j.latMax, j.lonMax]], {
          color: '#89b4fa', weight: 3, fill: false, dashArray: '6 4',
        }).addTo(map);
        map.fitBounds([[j.latMin, j.lonMin], [j.latMax, j.lonMax]]);
      } catch(e) {
        gribInfo.textContent = 'Could not reach plugin API';
      }
    }

    async function startCalculation() {
      if (!startLatLon || !endLatLon) return;
      const depTime = document.getElementById('departure-time').value;
      if (!depTime) return setStatus('error', 'Please set a departure time');

      clearIsochrones();
      if (legLabelLayer) { map.removeLayer(legLabelLayer); legLabelLayer = null; }
      if (calcStream) { calcStream.close(); calcStream = null; }
      calcBtn.disabled = true;
      progressWrap.style.display = 'block';
      progressBar.style.width = '0';
      setStatus('', 'Connecting…');
      console.log(`[startCalculation] t=${Date.now()}`);

      // Open SSE stream and wait for onopen before sending the POST.
      // This guarantees the server has registered the client in sseClients
      // before the calculation starts, so no onProgress events are missed.
      try {
        await openCalcStream();
      } catch(e) {
        setStatus('error', `Could not open event stream: ${e.message}`);
        calcBtn.disabled = false;
        return;
      }

      setStatus('', 'Sending request…');

      try {
        const r = await apiFetch(`${API}/calculate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            start: startLatLon,
            end: endLatLon,
            departureTime: new Date(depTime).toISOString(),
          }),
        });
        const j = await r.json();
        if (j.error) {
          if (calcStream) { calcStream.close(); calcStream = null; }
          setStatus('error', j.error);
          calcBtn.disabled = false;
          return;
        }
      } catch(e) {
        if (calcStream) { calcStream.close(); calcStream = null; }
        setStatus('error', String(e));
        calcBtn.disabled = false;
        return;
      }

      if (!calcStream) return; // SSE error/done already handled the result
      setStatus('', 'Calculating…');
    }

    function openCalcStream() {
      return new Promise((resolve, reject) => {
        console.log(`[openCalcStream] EventSource created t=${Date.now()}`);
        const stream = new EventSource(`${API}/calculation-stream`);
        const hangTimer = setTimeout(() => {
          console.log(`[openCalcStream] HANG: onopen has not fired after 5s, readyState=${stream.readyState}`);
        }, 5000);

        stream.onopen = () => {
          clearTimeout(hangTimer);
          console.log(`[openCalcStream] onopen fired t=${Date.now()}`);
          calcStream = stream;
          resolve();
        };

        stream.onmessage = (e) => {
          const j = JSON.parse(e.data);

          if (j.type === 'progress') {
            progressBar.style.width = `${j.progress}%`;
            setStatus('', `Calculating… ${j.progress}%`);
            if (j.frontier?.length) {
              const pts = sortByBearing(j.frontier.map(([lat, lon]) => [lat, lon]), startLatLon);
              pts.push(pts[0]);
              isochroneLayers.push(
                L.polyline(pts, { color: ISOCHRONE_COLOURS[isochroneLayers.length % ISOCHRONE_COLOURS.length], weight: 1.5, opacity: 0.6, interactive: false }).addTo(map)
              );
            }
          } else if (j.type === 'done') {
            stream.close(); calcStream = null;
            progressBar.style.width = '100%';
            setStatus('done', `Route saved to SignalK resources.\nRoute ID: ${j.routeId}`);
            calcBtn.disabled = false;
            fetchAndDrawRoute(j.routeId);
          } else if (j.type === 'error') {
            stream.close(); calcStream = null;
            clearIsochrones();
            setStatus('error', j.error ?? 'Unknown error');
            calcBtn.disabled = false;
            progressWrap.style.display = 'none';
          }
        };

        stream.onerror = () => {
          console.log(`[openCalcStream] onerror fired t=${Date.now()} calcStream=${calcStream !== null}`);
          stream.close();
          if (!calcStream) {
            // onopen never fired — connection failed
            reject(new Error('stream connection failed'));
          } else {
            calcStream = null;
            setStatus('error', 'Lost connection to calculation stream');
            calcBtn.disabled = false;
            progressWrap.style.display = 'none';
          }
        };
      });
    }

    function clearIsochrones() {
      isochroneLayers.forEach(l => map.removeLayer(l));
      isochroneLayers = [];
    }

    function formatDuration(ms) {
      const totalMinutes = Math.round(ms / 60000);
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h ${m}m`;
    }

    function formatCalcTime(ms) {
      return ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`;
    }

    function windBarbSvg(tws, windDir) {
      let remaining = Math.round(tws);
      const pennants = Math.floor(remaining / 50); remaining %= 50;
      const fulls    = Math.floor(remaining / 10); remaining %= 10;
      const halfs    = Math.floor(remaining / 5);

      // Staff points up; barbs drawn from tip downward; circle at base (observation point).
      let y = 2;
      let barbs = '';
      for (let i = 0; i < pennants; i++) {
        barbs += `<polygon points="0,${y} 8,${y + 4} 0,${y + 8}" fill="#333"/>`;
        y += 10;
      }
      for (let i = 0; i < fulls; i++) {
        barbs += `<line x1="0" y1="${y}" x2="8" y2="${y + 4}" stroke="#333" stroke-width="1.5"/>`;
        y += 5;
      }
      if (halfs) {
        barbs += `<line x1="0" y1="${y}" x2="4" y2="${y + 2}" stroke="#333" stroke-width="1.5"/>`;
      }
      const staff = (pennants + fulls + halfs) > 0
        ? `<line x1="0" y1="2" x2="0" y2="22" stroke="#333" stroke-width="1.5"/>`
        : '';

      return `<div style="transform:rotate(${windDir}deg);transform-origin:10px 22px;width:20px;height:24px;overflow:visible">` +
        `<svg width="20" height="24" viewBox="-4 0 12 24" style="overflow:visible">` +
        `${staff}${barbs}` +
        `<circle cx="0" cy="22" r="3" fill="none" stroke="#333" stroke-width="1.5"/>` +
        `</svg></div>`;
    }

    async function fetchAndDrawRoute(routeId) {
      try {
        const skUrl = `/signalk/v2/api/resources/routes/${encodeURIComponent(routeId)}`;
        const r = await apiFetch(skUrl);
        if (!r.ok) { setStatus('error', `Could not fetch route (HTTP ${r.status})`); return; }
        const route = await r.json();
        const coords = route.feature?.geometry?.coordinates;
        if (!coords) { setStatus('error', 'Route has no coordinates'); return; }

        if (routeLayer) map.removeLayer(routeLayer);
        if (windBarbLayer) map.removeLayer(windBarbLayer);

        routeLayer = L.polyline(coords.map(([lng, lat]) => [lat, lng]), {
          color: '#89b4fa', weight: 3, opacity: 0.9,
        }).addTo(map);
        map.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });

        const meta = route.feature?.properties?.coordinatesMeta ?? [];
        windBarbLayer = L.layerGroup();
        coords.forEach(([lng, lat], i) => {
          const m = meta[i];
          if (!m) return;
          L.marker([lat, lng], {
            icon: L.divIcon({ html: windBarbSvg(m.tws ?? 0, m.windDir ?? 0), iconSize: [20, 24], iconAnchor: [10, 22], className: '' }),
            pane: 'windBarbPane',
          }).addTo(windBarbLayer);
        });
        windBarbLayer.addTo(map);

        if (legLabelLayer) map.removeLayer(legLabelLayer);
        legLabelLayer = L.layerGroup();
        for (let i = 0; i < coords.length - 1; i++) {
          const m1 = meta[i], m2 = meta[i + 1];
          if (!m1?.time || !m2?.time) continue;
          const travelMs = new Date(m2.time) - new Date(m1.time);
          if (travelMs <= 0) continue;
          const midLat = (coords[i][1] + coords[i + 1][1]) / 2;
          const midLng = (coords[i][0] + coords[i + 1][0]) / 2;
          const travelLabel =
            `<div style="color:#cdd6f4;background:#313244cc;font-size:11px;` +
            `padding:1px 5px;border-radius:3px;white-space:nowrap;pointer-events:none">` +
            `${formatDuration(travelMs)}</div>`;
          const calcLabel =
            `<div style="color:#f38ba8;background:#313244cc;font-size:11px;` +
            `padding:1px 5px;border-radius:3px;white-space:nowrap;pointer-events:none">` +
            `${formatCalcTime(m2.legCalcMs ?? 0)}</div>`;
          L.marker([midLat, midLng], {
            icon: L.divIcon({
              html: `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none">` +
                    `${travelLabel}${calcLabel}</div>`,
              iconSize: null, iconAnchor: null, className: '',
            }),
            pane: 'windBarbPane',
            interactive: false,
          }).addTo(legLabelLayer);
        }
        legLabelLayer.addTo(map);
      } catch(e) { setStatus('error', `Draw failed: ${e}`); }
    }

    function activatePlacing(which) {
      placing = which;
      btnStart.classList.toggle('active', which === 'start');
      btnEnd.classList.toggle('active', which === 'end');
      map.getContainer().style.cursor = 'crosshair';
    }

    function updateCalcButton() {
      calcBtn.disabled = !(startLatLon && endLatLon);
    }

    function runTest() {
      const s = { lat: 60.027083, lon: 19.857472 };
      const e = { lat: 58.410222, lon: 19.105806 };
      startLatLon = s;
      endLatLon   = e;
      startCoords.textContent = `${s.lat.toFixed(4)}, ${s.lon.toFixed(4)}`;
      endCoords.textContent   = `${e.lat.toFixed(4)}, ${e.lon.toFixed(4)}`;
      startMarker.setLatLng([s.lat, s.lon]).addTo(map);
      endMarker.setLatLng([e.lat, e.lon]).addTo(map);
      document.getElementById('departure-time').value = toLocalDateTimeInput(new Date('2026-05-25T04:00:00Z'));
      updateCalcButton();
      startCalculation();
    }

    function setStatus(type, msg) {
      statusBox.className = type === 'error' || type === 'done' ? type : '';
      statusBox.textContent = msg;
    }

    function toLocalDateTimeInput(d) {
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function greenIcon() {
      return L.divIcon({ html: '<div style="background:#a6e3a1;width:12px;height:12px;border-radius:50%;border:2px solid #1e2230"></div>', iconSize:[12,12], iconAnchor:[6,6] });
    }
    function redIcon() {
      return L.divIcon({ html: '<div style="background:#f38ba8;width:12px;height:12px;border-radius:50%;border:2px solid #1e2230"></div>', iconSize:[12,12], iconAnchor:[6,6] });
    }

    document.getElementById('land-toggle').addEventListener('change', async (e) => {
      if (e.target.checked) {
        if (landLayer) { landLayer.addTo(map); return; }
        if (!gribBounds) { e.target.checked = false; return; }
        const { latMin, lonMin, latMax, lonMax } = gribBounds;
        const r = await apiFetch(`${API}/land-polygons?latMin=${latMin}&lonMin=${lonMin}&latMax=${latMax}&lonMax=${lonMax}`);
        if (!r.ok) { e.target.checked = false; return; }
        landLayer = L.geoJSON(await r.json(), {
          style: { color: '#6c7086', weight: 0.5, fillColor: '#45475a', fillOpacity: 0.5, pane: 'landPane' },
          renderer: L.canvas({ pane: 'landPane' }),
        }).addTo(map);
      } else {
        if (landLayer) map.removeLayer(landLayer);
      }
    });
  </script>
</body>
</html>
